name: Publish PHP (Packagist webhook)

on:
  push:
    tags:
      - 'v*'

# PHP publishes automatically via Packagist webhook on the zeromcp-php subtree repo.
# This workflow just pushes the subtree to trigger it.
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push subtree to zeromcp-php
        run: |
          git remote add zeromcp-php https://x-access-token:${{ secrets.SUBTREE_PAT }}@github.com/antidrift-dev/zeromcp-php.git || true
          SHA=$(git subtree split --prefix=php HEAD)
          git push zeromcp-php "$SHA:refs/heads/main" --force
          git push zeromcp-php "$SHA:refs/tags/${{ github.ref_name }}" --force
