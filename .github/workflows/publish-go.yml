name: Publish Go (subtree push)

on:
  push:
    tags:
      - 'v*'

# Go modules pull from git tags. Push subtree + tag to zeromcp-go.
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push subtree to zeromcp-go
        run: |
          git remote add zeromcp-go https://x-access-token:${{ secrets.SUBTREE_PAT }}@github.com/antidrift-dev/zeromcp-go.git || true
          SHA=$(git subtree split --prefix=go HEAD)
          git push zeromcp-go "$SHA:refs/heads/main" --force
          git push zeromcp-go "$SHA:refs/tags/${{ github.ref_name }}" --force
